name: Create wheel

on:
  # run when a release has been created
  release:
    types: [created]
  # push:
  #   branches:
  #     - "go_wheel_*"

# env:
#   # comment TWINE_REPOSITORY_URL to use the real pypi. NOTE: change also the secret used in TWINE_PASSWORD
#   TWINE_REPOSITORY_URL: https://test.pypi.org/legacy/

jobs:
  build_source_dist_and_pure_python_wheel:
    name: Build source dist and pure-Python wheel
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Remove tag-build from pyproject.toml
        # sqlalchemy has `tag-build` set to `dev` in pyproject.toml. It needs to be removed before creating the wheel
        # otherwise it gets tagged with `dev0`
        shell: pwsh
        # This is equivalent to the sed commands:
        # `sed -i '/tag-build="dev"/d' pyproject.toml`
        # `sed -i '/tag-build = "dev"/d' pyproject.toml`

        # `-replace` uses a regexp match
        run: |
          (get-content pyproject.toml) | %{$_ -replace 'tag-build.?=.?"dev"',""} | set-content pyproject.toml

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Build source dist and pure-Python wheel
        run: |
          python -m pip install --upgrade pip
          pip --version
          pip install build twine
          pip list
          DISABLE_SQLALCHEMY_CEXT=y python -m build
          twine check dist/*

      - uses: actions/upload-artifact@v7
        with:
          name: packages
          path: dist/

  pypi_publish_source_dist_and_pure_python_wheel:
    needs: [build_source_dist_and_pure_python_wheel]
    name: Upload source dist and pure-Python wheel to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: packages
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  build_platform_wheels:
    name: ${{ matrix.wheel_mode }} wheels ${{ matrix.python }} on ${{ matrix.os }} ${{ matrix.os == 'ubuntu-22.04' && matrix.linux_archs || '' }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # emulated wheels on linux take too much time, split wheels into multiple runs
        python:
          - "cp310-* cp311-*"
          - "cp312-* cp313-* cp314-*"
          - "cp314t-*"
        wheel_mode:
          - compiled
        os:
          - "windows-2022"
          - "windows-11-arm"
          - "macos-15"
          - "ubuntu-22.04"
          - "ubuntu-22.04-arm"
        linux_archs:
          # this is only meaningful on linux. windows and macos ignore exclude all but one arch
          - "aarch64"
          - "x86_64"
          - "riscv64"

        exclude:
          - os: "windows-2022"
            linux_archs: "aarch64"
          # ignored on windows, just avoid to run it multiple times
          - os: "windows-11-arm"
            linux_archs: "aarch64"
          - os: "macos-15"
            linux_archs: "x86_64"
          - os: "ubuntu-22.04"
            linux_archs: "aarch64"
          - os: "ubuntu-22.04-arm"
            linux_archs: "x86_64"
          - os: "windows-2022"
            linux_archs: "riscv64"
          - os: "windows-11-arm"
            linux_archs: "riscv64"
          - os: "macos-15"
            linux_archs: "riscv64"
          - os: "ubuntu-22.04-arm"
            linux_archs: "riscv64"

      fail-fast: false

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      # See details at https://cibuildwheel.readthedocs.io/en/stable/faq/#emulation
      - name: Set up QEMU
        if: matrix.linux_archs == 'riscv64'
        uses: docker/setup-qemu-action@v4
        with:
          platforms: riscv64

      - name: Remove tag-build from pyproject.toml
        # sqlalchemy has `tag-build` set to `dev` in pyproject.toml. It needs to be removed before creating the wheel
        # otherwise it gets tagged with `dev0`
        shell: pwsh
        # This is equivalent to the sed commands:
        # `sed -i '/tag-build="dev"/d' pyproject.toml`
        # `sed -i '/tag-build = "dev"/d' pyproject.toml`

        # `-replace` uses a regexp match
        run: |
          (get-content pyproject.toml) | %{$_ -replace 'tag-build.?=.?"dev"',""} | set-content pyproject.toml

      - name: Build compiled wheels
        if: ${{ matrix.wheel_mode == 'compiled' }}
        uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_ARCHS_LINUX: ${{ matrix.linux_archs }}
          CIBW_BUILD: ${{ matrix.python }}
          CIBW_ENABLE: ${{ matrix.python == 'cp314t-*' && 'cpython-freethreading' || '' }}
          # setting it here does not work on linux
          # PYTHONNOUSERSITE: "1"

      - name: Upload wheels to release
        # upload the generated wheels to the github release
        uses: sqlalchemyorg/upload-release-assets@sa
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          files: './wheelhouse/*.whl'

      - uses: actions/upload-artifact@v7
        with:
          name: platform_wheels
          path: wheelhouse/

  pypi_publish_platform_wheels:
    needs: [build_platform_wheels]
    name: Upload platform wheels to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: platform_wheels
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
